<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tech Mini Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h2>Tech Mini Store</h2>
</header>

<div class="container">

<div class="product">

<img src="images/flipper.jpg">

<h3>Flipper Zero</h3>
<p class="price">₹19,999</p>

<input id="pincode" placeholder="Enter Pincode">

<button onclick="checkPin()">Check Service</button>

<p id="pinmsg"></p>

<div class="buttons">
<button class="cart">Add to Cart</button>
<button class="buy" onclick="buyNow()">Buy Now</button>
</div>

<div class="warranty">
<img src="images/warranty.png">
<p>17 Days Warranty</p>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
